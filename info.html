Current fee/payment structure shown in official UIU sources
UIU’s current official pages and 2025–2026 registration/calendar notices consistently show that students are required to pay Tk. 20,000 as a partial payment of tuition fees before course registration.

For trimester-based programs, the remaining tuition is paid in three installments: 40%, 30%, and 30%. 
For semester-based programs, the remaining tuition is paid in four equal installments of 25% each. 


Important waiver/scholarship policy points now shown by UIU
UIU’s current policy page says the academic waiver/scholarship policy is effective from Spring 2025 until further order and is applicable only for students admitted from Spring 2025 and onward. The policy page also states that scholarship/waiver is not applicable for Thesis, Project, Internship, Retake, and Repeat courses.


Scholarship eligibility-related registration rule
In department-level Spring 2026 and Fall 2025 registration notices, UIU states that students must register at least a minimum credit load to remain eligible for scholarship/tuition-fee waiver. Pharmacy notices say at least 14 credits for semester students, while an EEE Spring 2026 self-registration notice says at least 9 credits without capstone project for that trimester context.


Newly admitted student registration notices relevant to tuition/installments
UIU’s Summer 2025 Trimester newly admitted student notice, published July 16, 2025, explicitly says students must pay Tk. 20,000 before registration, after which trimester students pay the rest in 40/30/30 installments and semester students pay the rest in four 25% installments. 
UIU also published similar newly admitted student notices for Fall 2025 Trimester and Spring 2026 Trimester, and the search snippets indicate the same tuition installment pattern there as well.


Academic-calendar payment deadlines and fines
UIU’s Fall 2025 Trimester Undergraduate Programs [Revised] calendar gives the installment timetable clearly: 40% of remaining tuition by the 1st installment date, 70% cumulative by the 2nd installment date, and 100% by the 3rd installment date, with a Tk. 500 fine if the required level is not paid by each deadline. The Spring 2026 trimester and Spring 2026 semester calendar snippets indicate the same structure for trimester and 25%-based semester schedules respectively.

Registration fees I found in notices
For Student Transportation Service, UIU published official notices for Fall 2025 and Spring 2026 stating the registration fee is Tk. 4,000 per trimester and Tk. 6,000 per semester, and that the full registration fee must be paid with the first installment of tuition fees.

For the Gymnasium, UIU’s Spring 2026 and Fall 2025 notices state the registration fee is Tk. 1,500 per trimester and Tk. 2,200 per semester, and it also must be paid in full with the first tuition installment.

What this means for your calculator
Based on the current official UIU materials I found, the strongest rules to reflect are: Tk. 20,000 partial tuition payment before registration, trimester remaining balance in 40/30/30, semester remaining balance in four 25% installments, and no scholarship/waiver on Thesis/Project/Internship/Retake/Repeat courses. Transport and gym registration fees are separate and are paid fully with the first installment if chosen.
